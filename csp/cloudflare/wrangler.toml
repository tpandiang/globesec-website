# Cloudflare Worker config for the live Tradier quote proxy.
# Deploy with:  npx wrangler deploy   (run from this folder)
name = "globesec-tradier-proxy"
main = "tradier-proxy.js"
compatibility_date = "2025-01-01"

# Serve the Worker on your domain at /api/*
# (Requires globesec.ai to be on this Cloudflare account, which it is.)
routes = [
  { pattern = "globesec.ai/api/*", zone_name = "globesec.ai" }
]

# Non-secret var. Use https://sandbox.tradier.com for free delayed data while testing.
[vars]
TRADIER_BASE_URL = "https://api.tradier.com"

# TRADIER_TOKEN is a SECRET — do not put it here. Set it with:
#   npx wrangler secret put TRADIER_TOKEN
