name: CSP Wheel Screener

# Publishes csp/screener/screener.json for globesec.ai/csp/screener/
# Data: CBOE delayed (no key) + Finnhub (earnings/sector) via FINNHUB_API_KEY secret.
on:
  workflow_dispatch:
  schedule:
    - cron: "*/20 13-20 * * 1-5"   # every 20 min, ~US market hours

permissions:
  contents: write

concurrency:
  group: csp-screener
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: csp/screener/scanner
        run: pip install -r requirements.txt
      - name: Run screener
        working-directory: csp/screener/scanner
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python run.py
      - name: Commit results if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csp/screener/screener.json csp/screener/scanner/data/sectors.json
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "chore(screener): update results [skip ci]"
            git push
          fi
