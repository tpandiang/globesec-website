name: CSP Data Refresh

# Runs BOTH the CSP scanner and the wheel screener, then commits their JSON in a SINGLE
# commit -> one Cloudflare Pages build per cycle (stays under the 500 builds/month free tier).
on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 13-20 * * 1-5"   # every 30 min, ~US market hours (data is ~15 min delayed)

permissions:
  contents: write

concurrency:
  group: csp-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # Set these as repo secrets to auto-purge Cloudflare after each data refresh.
      # If unset, the purge step is skipped (everything else still works).
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r csp/scanner/requirements.txt
          pip install -r csp/screener/scanner/requirements.txt

      - name: Run CSP scanner (results.json)
        working-directory: csp/scanner
        run: python run.py

      - name: Run wheel screener (screener.json)
        working-directory: csp/screener/scanner
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python run.py

      - name: Commit results in one commit
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csp/results.json csp/screener/screener.json csp/screener/scanner/data/sectors.json
          if git diff --staged --quiet; then
            echo "No change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            # NOTE: do NOT put [skip ci] here — Cloudflare Pages honors it and would
            # skip deploying the refreshed data, leaving the live site stale.
            git commit -m "chore(csp): refresh scanner + screener data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Cloudflare Pages deploy, then purge until live is fresh
        if: steps.commit.outputs.changed == 'true' && env.CF_API_TOKEN != '' && env.CF_ZONE_ID != ''
        run: |
          # strip any stray whitespace/newlines that would make the URL malformed (curl exit 3)
          zone=$(printf '%s' "$CF_ZONE_ID" | tr -d '[:space:]')
          token=$(printf '%s' "$CF_API_TOKEN" | tr -d '[:space:]')
          echo "Zone ID length: ${#zone} (expected 32)"
          expected=$(python -c "import json;print(json.load(open('csp/screener/screener.json'))['generated_at'])")
          echo "Target generated_at=$expected — waiting for the Pages build, then purging the edge cache."
          fresh=0
          for i in $(seq 1 20); do
            sleep 15
            resp=$(curl -sS -X POST \
              "https://api.cloudflare.com/client/v4/zones/${zone}/purge_cache" \
              -H "Authorization: Bearer ${token}" \
              -H "Content-Type: application/json" \
              --data '{"files":["https://globesec.ai/csp/results.json","https://globesec.ai/csp/screener/screener.json"]}')
            echo "$resp" | grep -q '"success":true' || echo "  purge attempt $i response: $resp"
            live=$(curl -s "https://globesec.ai/csp/screener/screener.json?cb=${i}${RANDOM}" | python -c "import sys,json;print(json.load(sys.stdin).get('generated_at',''))" 2>/dev/null || echo "")
            echo "  attempt $i: live generated_at=$live"
            if [ "$live" = "$expected" ]; then fresh=1; echo "  live is fresh"; break; fi
          done
          [ "$fresh" = 1 ] || echo "::warning::Live data did not catch up within ~5 min — the Cloudflare Pages build may be slow or a cache rule is overriding the purge."
