name: CSP Data Refresh

# Runs BOTH the CSP scanner and the wheel screener, then commits their JSON in a SINGLE
# commit -> one Cloudflare Pages build per cycle (stays under the 500 builds/month free tier).
on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 13-20 * * 1-5"   # every 30 min, ~US market hours (data is ~15 min delayed)

permissions:
  contents: write

concurrency:
  group: csp-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      # Set these as repo secrets to auto-purge Cloudflare after each data refresh.
      # If unset, the purge step is skipped (everything else still works).
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r csp/scanner/requirements.txt
          pip install -r csp/screener/scanner/requirements.txt

      - name: Run CSP scanner (results.json)
        working-directory: csp/scanner
        run: python run.py

      - name: Run wheel screener (screener.json)
        working-directory: csp/screener/scanner
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python run.py

      - name: Commit results in one commit
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csp/results.json csp/screener/screener.json csp/screener/scanner/data/sectors.json
          if git diff --staged --quiet; then
            echo "No change"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(csp): refresh scanner + screener data [skip ci]"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge Cloudflare cache for the data files
        if: steps.commit.outputs.changed == 'true' && env.CF_API_TOKEN != ''
        run: |
          resp=$(curl -sS -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"files":["https://globesec.ai/csp/results.json","https://globesec.ai/csp/screener/screener.json"]}')
          echo "Cloudflare response: $resp"
          # token is only in the request header, never in the response, so this is safe to log
          echo "$resp" | grep -q '"success":true' || { echo "::error::Cloudflare purge failed (see response above)"; exit 1; }
