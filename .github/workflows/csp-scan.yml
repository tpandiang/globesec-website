name: CSP Scan

# Publishes csp/results.json for the static scanner page at globesec.ai/csp/
on:
  workflow_dispatch:        # manual "Run workflow" button
  schedule:
    # Every 30 min, 13:00-20:59 UTC, Mon-Fri (~US market hours).
    - cron: "*/30 13-20 * * 1-5"

permissions:
  contents: write           # allow committing results.json back to the repo

concurrency:
  group: csp-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: csp/scanner
        run: pip install -r requirements.txt

      - name: Run scan
        working-directory: csp/scanner
        env:
          TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}
          TRADIER_BASE_URL: ${{ vars.TRADIER_BASE_URL || 'https://api.tradier.com' }}
        run: python run.py

      - name: Commit results if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csp/results.json
          if git diff --staged --quiet; then
            echo "No change in results.json"
          else
            git commit -m "chore(csp): update scan results [skip ci]"
            git push
          fi
