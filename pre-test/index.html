<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Security Pre-Test - GlobeSec.ai</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --bg: #0a1628; --bg2: #0f2744; --bg3: #162d50;
    --accent: #00d4ff; --accent2: #7b61ff; --aws: #ff9900;
    --text: #e0e8f0; --text-muted: #8899aa; --white: #ffffff;
    --gradient: linear-gradient(135deg, #00d4ff 0%, #7b61ff 100%);
    --border: rgba(0, 212, 255, 0.1);
    --correct: #10b981; --wrong: #ef4444;
}
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

/* Top bar */
.topbar {
    background: rgba(10, 22, 40, 0.95); backdrop-filter: blur(20px); color: #fff;
    padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100; height: 60px; border-bottom: 1px solid var(--border);
}
.topbar-left { display: flex; align-items: center; gap: 1rem; }
.back-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.3rem; font-weight: 500; }
.back-link:hover { text-decoration: underline; }
.topbar-title { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 0.6rem; }
.aws-badge { background: var(--aws); color: #232f3e; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
.globe-badge { background: var(--gradient); color: var(--bg); padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 800; }
.topbar-right { display: flex; gap: 0.75rem; align-items: center; }
.topbar-btn { background: var(--bg3); color: var(--accent); border: 1px solid var(--border); padding: 0.35rem 0.7rem; border-radius: 6px; font-size: 0.78rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.topbar-btn:hover { background: var(--accent); color: var(--bg); }

/* Main content */
.main-wrap { max-width: 960px; margin: 0 auto; padding: 1.5rem 2rem; }

/* Score banner */
.score-banner {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 1.2rem 1.5rem; margin-bottom: 1.25rem;
    display: flex; justify-content: space-between; align-items: center;
}
.score-banner-left h2 { font-size: 1.2rem; color: var(--white); margin-bottom: 0.2rem; }
.score-banner-left p { font-size: 0.85rem; color: var(--text-muted); }
.score-big { font-size: 2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.score-label { font-size: 0.75rem; color: var(--text-muted); }
.reset-all-btn { background: var(--gradient); color: var(--bg); border: none; padding: 0.5rem 1.2rem; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; margin-left: 1rem; transition: opacity 0.2s; }
.reset-all-btn:hover { opacity: 0.85; }

/* Progress bar */
.progress-wrap { margin-bottom: 1.25rem; }
.progress-bar { background: var(--bg2); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-fill { background: var(--gradient); height: 100%; width: 0%; transition: width 0.3s; border-radius: 4px; }
.progress-text { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.3rem; }

/* Domain separator */
.domain-sep { background: linear-gradient(90deg, var(--aws), transparent); height: 2px; margin: 1.5rem 0 0.5rem; border-radius: 2px; }
.domain-label { font-size: 0.75rem; font-weight: 700; color: var(--aws); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 0.75rem; }

/* Question */
.question { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 0.75rem; }
.question-text { font-size: 0.9rem; font-weight: 600; color: var(--white); margin-bottom: 0.75rem; display: flex; gap: 0.5rem; }
.question-num { color: var(--aws); font-weight: 700; white-space: nowrap; }
.q-type-badge { font-size: 0.65rem; background: var(--accent2); color: #fff; padding: 0.1rem 0.4rem; border-radius: 3px; font-weight: 700; vertical-align: middle; margin-left: 0.4rem; }
.options { display: flex; flex-direction: column; gap: 0.4rem; }
.option { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.55rem 0.8rem; border-radius: 6px; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); font-size: 0.85rem; }
.option:hover:not(.disabled) { border-color: var(--accent); background: rgba(0,212,255,0.05); }
.option.disabled { cursor: default; }
.option-letter { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; border: 1px solid var(--border); color: var(--text-muted); background: var(--bg); transition: all 0.2s; }
.option.selected .option-letter { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.option.correct { border-color: var(--correct); background: rgba(16,185,129,0.08); }
.option.correct .option-letter { background: var(--correct); color: #fff; border-color: var(--correct); }
.option.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.08); }
.option.wrong .option-letter { background: var(--wrong); color: #fff; border-color: var(--wrong); }
.option.ma-selected { border-color: var(--accent); background: rgba(0,212,255,0.08); }
.option.ma-selected .option-letter { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.option-text { flex: 1; }
.check-btn { margin-top: 0.6rem; background: var(--gradient); color: var(--bg); border: none; padding: 0.45rem 1.2rem; border-radius: 6px; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
.check-btn:hover { opacity: 0.85; }
.check-btn.disabled { opacity: 0.4; cursor: default; }
.explanation { margin-top: 0.6rem; padding: 0.6rem 0.8rem; border-radius: 6px; background: rgba(16,185,129,0.06); border-left: 3px solid var(--correct); font-size: 0.82rem; color: var(--text); display: none; }
.explanation.show { display: block; }
.explanation strong { color: var(--correct); }

/* Policy code block */
.policy-block { background: #0d1b2a; border: 1px solid var(--border); border-radius: 6px; padding: 0.8rem 1rem; margin: 0.5rem 0 0.75rem; font-family: 'Consolas', 'Courier New', monospace; font-size: 0.78rem; color: #8ec8e8; white-space: pre; overflow-x: auto; line-height: 1.5; }

@media (max-width: 900px) {
    .main-wrap { padding: 1rem; }
    .topbar-title span:last-child { display: none; }
    .score-banner { flex-direction: column; gap: 0.75rem; text-align: center; }
}
</style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <a href="../index.html" class="back-link">&#8592; GlobeSec.ai</a>
        <div class="topbar-title">
            <span class="globe-badge">GlobeSec</span>
            <span class="aws-badge">SCS-C03</span>
            <span>Pre-Test Assessment</span>
        </div>
    </div>
    <div class="topbar-right">
        <a href="../training.html" class="topbar-btn">Study Guide</a>
        <a href="../training/iam-advanced.html" class="topbar-btn">IAM Practice</a>
        <button class="topbar-btn" onclick="resetAll()">Reset All</button>
    </div>
</div>

<div class="main-wrap">

<div class="score-banner">
    <div class="score-banner-left">
        <h2>AWS Security Pre-Test Assessment</h2>
        <p>All domains &mdash; assess your readiness before deep study</p>
    </div>
    <div class="score-banner-right" style="display:flex;align-items:center;">
        <div>
            <div class="score-big" id="overallScore">0/0</div>
            <div class="score-label">Correct Answers</div>
        </div>
        <button class="reset-all-btn" onclick="resetAll()">Reset All</button>
    </div>
</div>

<div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">0 / 0 answered</div>
</div>

<!-- QUESTIONS WILL BE ADDED HERE -->

</div>

<script>
var totalQuestions = 0;
var totalCorrect = 0;
var totalAnswered = 0;

function updateScoreDisplay() {
    document.getElementById('overallScore').textContent = totalCorrect + '/' + totalQuestions;
    document.getElementById('progressFill').style.width = totalQuestions > 0 ? (totalAnswered / totalQuestions * 100) + '%' : '0%';
    document.getElementById('progressText').textContent = totalAnswered + ' / ' + totalQuestions + ' answered';
}

function selectMC(optEl, idx) {
    var question = optEl.closest('.question');
    if (question.dataset.answered) return;
    question.dataset.answered = 'true';
    var correct = parseInt(question.dataset.answer);
    var opts = question.querySelectorAll('.option');
    opts.forEach(function(o) { o.classList.add('disabled'); });
    opts[correct].classList.add('correct');
    if (idx === correct) {
        optEl.classList.add('selected');
        totalCorrect++;
    } else {
        optEl.classList.add('wrong');
    }
    totalAnswered++;
    question.querySelector('.explanation').classList.add('show');
    updateScoreDisplay();
}

// MA: multi-answer toggle
function toggleMA(optEl) {
    var question = optEl.closest('.question');
    if (question.dataset.answered) return;
    optEl.classList.toggle('ma-selected');
}

// MA: check answers
function checkMA(btn) {
    var question = btn.closest('.question');
    if (question.dataset.answered) return;
    question.dataset.answered = 'true';
    btn.classList.add('disabled');

    var correctIndices = question.dataset.answers.split(',').map(Number);
    var opts = question.querySelectorAll('.option');
    var allCorrect = true;

    opts.forEach(function(o) {
        var idx = parseInt(o.dataset.idx);
        var isCorrect = correctIndices.indexOf(idx) !== -1;
        var isSelected = o.classList.contains('ma-selected');
        o.classList.add('disabled');
        o.classList.remove('ma-selected');

        if (isCorrect) {
            o.classList.add('correct');
        }
        if (isSelected && !isCorrect) {
            o.classList.add('wrong');
            allCorrect = false;
        }
        if (!isSelected && isCorrect) {
            allCorrect = false;
        }
    });

    if (allCorrect) {
        totalCorrect++;
    }
    totalAnswered++;
    question.querySelector('.explanation').classList.add('show');
    updateScoreDisplay();
}

function resetAll() {
    totalCorrect = 0;
    totalAnswered = 0;
    document.querySelectorAll('.question').forEach(function(q) {
        delete q.dataset.answered;
        q.querySelectorAll('.option').forEach(function(o) {
            o.classList.remove('correct', 'wrong', 'selected', 'disabled', 'ma-selected');
        });
        q.querySelector('.explanation').classList.remove('show');
        var cb = q.querySelector('.check-btn');
        if (cb) cb.classList.remove('disabled');
    });
    updateScoreDisplay();
}
</script>
</body>
</html>
