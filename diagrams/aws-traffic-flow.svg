<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1150" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b61ff"/>
    </linearGradient>
    <linearGradient id="aws-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9900"/>
      <stop offset="100%" style="stop-color:#ffb84d"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="waf-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-return" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7b61ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="1150" rx="12" fill="#0a1628"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">User Login Process to AWS Resource — Architecture Diagram</text>
  <text x="450" y="55" text-anchor="middle" fill="#8899aa" font-size="12">Full traffic flow from browser to database and back</text>

  <!-- ==================== USER ==================== -->
  <rect x="365" y="72" width="170" height="44" rx="22" fill="#162d50" stroke="#00d4ff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="405" y="99" fill="#fff" font-size="18">&#x1F464;</text>
  <text x="428" y="99" fill="#e0e8f0" font-size="13" font-weight="600">User (Browser)</text>

  <!-- Arrow: User → Route 53 -->
  <line x1="450" y1="116" x2="450" y2="148" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== AWS EDGE SERVICES ==================== -->
  <rect x="60" y="148" width="780" height="115" rx="10" fill="none" stroke="#ff9900" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="75" y="167" fill="#ff9900" font-size="11" font-weight="700" opacity="0.8">AWS EDGE / GLOBAL</text>

  <!-- Route 53 -->
  <rect x="345" y="160" width="210" height="38" rx="8" fill="#162d50" stroke="#ff9900" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="370" y="184" fill="#ff9900" font-size="13" font-weight="700">Route 53</text>
  <text x="450" y="184" fill="#8899aa" font-size="11">DNS Resolution</text>

  <!-- Arrow: Route 53 → CloudFront -->
  <line x1="450" y1="198" x2="450" y2="210" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CloudFront + Shield + WAF row -->
  <rect x="155" y="210" width="200" height="42" rx="8" fill="#162d50" stroke="#ff9900" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="180" y="236" fill="#ff9900" font-size="13" font-weight="700">CloudFront</text>
  <text x="273" y="236" fill="#8899aa" font-size="10">CDN Edge</text>

  <rect x="375" y="210" width="150" height="42" rx="8" fill="#162d50" stroke="url(#shield-grad)" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="395" y="236" fill="#10b981" font-size="13" font-weight="700">AWS Shield</text>

  <rect x="545" y="210" width="200" height="42" rx="8" fill="#162d50" stroke="url(#waf-grad)" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="570" y="236" fill="#ef4444" font-size="13" font-weight="700">AWS WAF</text>
  <text x="641" y="236" fill="#8899aa" font-size="10">Layer 7 Rules</text>

  <!-- Connector lines between edge services -->
  <line x1="355" y1="231" x2="375" y2="231" stroke="#8899aa" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="525" y1="231" x2="545" y2="231" stroke="#8899aa" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow: Edge → Internet Gateway -->
  <line x1="450" y1="262" x2="450" y2="295" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="460" y="282" fill="#8899aa" font-size="9">INTERNET</text>

  <!-- ==================== VPC ==================== -->
  <rect x="40" y="295" width="820" height="780" rx="12" fill="rgba(15,39,68,0.4)" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>
  <text x="60" y="318" fill="#00d4ff" font-size="14" font-weight="700">VPC</text>
  <text x="100" y="318" fill="#8899aa" font-size="11">10.0.0.0/16</text>

  <!-- Internet Gateway -->
  <rect x="370" y="328" width="160" height="38" rx="8" fill="#162d50" stroke="#ff9900" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="390" y="352" fill="#ff9900" font-size="13" font-weight="700">IGW</text>
  <text x="425" y="352" fill="#8899aa" font-size="10">Internet Gateway</text>

  <!-- Arrow: IGW → Public Subnet -->
  <line x1="450" y1="366" x2="450" y2="398" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== PUBLIC SUBNET ==================== -->
  <rect x="70" y="398" width="760" height="200" rx="10" fill="rgba(22,45,80,0.5)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="90" y="420" fill="#00d4ff" font-size="12" font-weight="600">Public Subnet</text>
  <text x="198" y="420" fill="#8899aa" font-size="10">10.0.1.0/24</text>

  <!-- NACL badge on Public Subnet border -->
  <rect x="70" y="430" width="760" height="24" rx="0" fill="rgba(239,68,68,0.08)" stroke="none"/>
  <rect x="80" y="432" width="120" height="20" rx="4" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="97" y="447" fill="#ef4444" font-size="10" font-weight="700">NACL (Inbound)</text>
  <text x="210" y="447" fill="#8899aa" font-size="9">Layer 3/4 — Stateless — src IP, dst IP, port, protocol → ALLOW or DENY</text>

  <!-- ELB/ALB -->
  <rect x="290" y="468" width="220" height="50" rx="8" fill="#162d50" stroke="#ff9900" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="330" y="490" fill="#ff9900" font-size="14" font-weight="700">ELB / ALB</text>
  <text x="315" y="508" fill="#8899aa" font-size="10">SSL termination • Health checks • Routing</text>

  <!-- WAF attached to ALB -->
  <rect x="540" y="468" width="150" height="50" rx="8" fill="#162d50" stroke="url(#waf-grad)" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="563" y="490" fill="#ef4444" font-size="13" font-weight="700">AWS WAF</text>
  <text x="558" y="508" fill="#8899aa" font-size="9">SQL/XSS • IP sets • L7</text>

  <!-- Connector: ALB ↔ WAF -->
  <line x1="510" y1="493" x2="540" y2="493" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="4,2"/>
  <text x="517" y="488" fill="#ef4444" font-size="8">attach</text>

  <!-- Security Group on ALB -->
  <rect x="290" y="530" width="220" height="20" rx="4" fill="#1a1a2e" stroke="#7b61ff" stroke-width="1"/>
  <text x="310" y="544" fill="#7b61ff" font-size="9" font-weight="600">Security Group</text>
  <text x="415" y="544" fill="#8899aa" font-size="9">Stateful • Allow rules only</text>

  <!-- Label: inspection order -->
  <rect x="90" y="565" width="140" height="22" rx="4" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>
  <text x="100" y="580" fill="#00d4ff" font-size="9" font-weight="600">Inspection: NACL → SG → WAF</text>

  <!-- Arrow: Public Subnet → Private Subnet -->
  <line x1="400" y1="598" x2="400" y2="635" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== PRIVATE SUBNET ==================== -->
  <rect x="70" y="635" width="760" height="175" rx="10" fill="rgba(22,45,80,0.5)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="90" y="657" fill="#00d4ff" font-size="12" font-weight="600">Private Subnet</text>
  <text x="195" y="657" fill="#8899aa" font-size="10">10.0.2.0/24</text>

  <!-- NACL badge on Private Subnet -->
  <rect x="70" y="665" width="760" height="24" rx="0" fill="rgba(239,68,68,0.08)" stroke="none"/>
  <rect x="80" y="667" width="120" height="20" rx="4" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="97" y="682" fill="#ef4444" font-size="10" font-weight="700">NACL (Inbound)</text>
  <text x="210" y="682" fill="#8899aa" font-size="9">Layer 3/4 — Stateless — Second check at private subnet boundary</text>

  <!-- Security Group on EC2 -->
  <rect x="290" y="700" width="220" height="20" rx="4" fill="#1a1a2e" stroke="#7b61ff" stroke-width="1"/>
  <text x="310" y="714" fill="#7b61ff" font-size="9" font-weight="600">Security Group</text>
  <text x="415" y="714" fill="#8899aa" font-size="9">Allow from ALB SG :443</text>

  <!-- EC2 -->
  <rect x="310" y="730" width="180" height="55" rx="8" fill="#162d50" stroke="#ff9900" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="348" y="755" fill="#ff9900" font-size="14" font-weight="700">EC2 Instance</text>
  <text x="340" y="775" fill="#8899aa" font-size="10">Application Server</text>

  <!-- Arrow: Private → Database Subnet -->
  <line x1="400" y1="810" x2="400" y2="850" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== DATABASE SUBNET ==================== -->
  <rect x="70" y="850" width="760" height="175" rx="10" fill="rgba(22,45,80,0.5)" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
  <text x="90" y="872" fill="#00d4ff" font-size="12" font-weight="600">Database Subnet</text>
  <text x="213" y="872" fill="#8899aa" font-size="10">10.0.3.0/24</text>

  <!-- NACL badge on DB Subnet -->
  <rect x="70" y="880" width="760" height="24" rx="0" fill="rgba(239,68,68,0.08)" stroke="none"/>
  <rect x="80" y="882" width="120" height="20" rx="4" fill="#1a1a2e" stroke="#ef4444" stroke-width="1"/>
  <text x="97" y="897" fill="#ef4444" font-size="10" font-weight="700">NACL (Inbound)</text>
  <text x="210" y="897" fill="#8899aa" font-size="9">Layer 3/4 — Stateless — Third check at database subnet boundary</text>

  <!-- Security Group on RDS -->
  <rect x="290" y="915" width="220" height="20" rx="4" fill="#1a1a2e" stroke="#7b61ff" stroke-width="1"/>
  <text x="310" y="929" fill="#7b61ff" font-size="9" font-weight="600">Security Group</text>
  <text x="415" y="929" fill="#8899aa" font-size="9">Allow from EC2 SG :3306</text>

  <!-- RDS -->
  <rect x="310" y="945" width="180" height="55" rx="8" fill="#162d50" stroke="#ff9900" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="365" y="970" fill="#ff9900" font-size="14" font-weight="700">RDS</text>
  <text x="335" y="988" fill="#8899aa" font-size="10">MySQL / PostgreSQL</text>

  <!-- ==================== RETURN PATH ==================== -->
  <rect x="130" y="1045" width="640" height="50" rx="8" fill="rgba(123,97,255,0.08)" stroke="#7b61ff" stroke-width="1"/>
  <text x="225" y="1066" fill="#7b61ff" font-size="12" font-weight="700">Response Path (Reverse)</text>
  <text x="160" y="1084" fill="#8899aa" font-size="10">RDS → EC2 → ALB → IGW → Internet → User</text>
  <text x="508" y="1084" fill="#ef4444" font-size="10">NACLs re-check outbound (stateless)</text>

  <!-- Return arrow: RDS → up the right side -->
  <path d="M 500 970 L 780 970 L 780 100 L 535 100" stroke="#7b61ff" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-return)" opacity="0.6"/>
  <text x="790" y="540" fill="#7b61ff" font-size="10" font-weight="600" transform="rotate(90, 790, 540)" opacity="0.6">RESPONSE PATH</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="60" y="1105" width="780" height="35" rx="6" fill="#0f2744" stroke="rgba(0,212,255,0.1)" stroke-width="1"/>

  <rect x="80" y="1115" width="12" height="12" rx="2" fill="none" stroke="#ff9900" stroke-width="1.5"/>
  <text x="98" y="1126" fill="#8899aa" font-size="10">AWS Service</text>

  <rect x="185" y="1115" width="12" height="12" rx="2" fill="none" stroke="#ef4444" stroke-width="1.5"/>
  <text x="203" y="1126" fill="#8899aa" font-size="10">NACL (Stateless)</text>

  <rect x="315" y="1115" width="12" height="12" rx="2" fill="none" stroke="#7b61ff" stroke-width="1.5"/>
  <text x="333" y="1126" fill="#8899aa" font-size="10">Security Group (Stateful)</text>

  <line x1="485" y1="1121" x2="510" y2="1121" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="518" y="1126" fill="#8899aa" font-size="10">Request Flow</text>

  <line x1="605" y1="1121" x2="630" y2="1121" stroke="#7b61ff" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="638" y="1126" fill="#8899aa" font-size="10">Response Flow</text>
</svg>